name: Security Checks

"on":
  push:
    branches:
      - development
      - main
  pull_request:

jobs:
  security:
    name: Run security scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2

      - name: Run Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Build backend Docker image
        run: docker build -t fastapi-backend:security-scan -f backend/Dockerfile .

      - name: Run Trivy backend image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi-backend:security-scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Build frontend Docker image
        run: docker build -t fastapi-frontend:security-scan -f frontend/Dockerfile .

      - name: Run Trivy frontend image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: fastapi-frontend:security-scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Run pip-audit dependency scan
        run: pip-audit
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit dependency scan
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true