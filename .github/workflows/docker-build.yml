name: Build and Push Docker Images

"on":
  push:
    branches:
      - development
      - main

jobs:
  docker:
    name: Build and Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/fastapi-backend:latest \
            -f backend/Dockerfile .

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/fastapi-backend:latest

      - name: Build frontend image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/fastapi-frontend:latest \
            -f frontend/Dockerfile .

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/fastapi-frontend:latest