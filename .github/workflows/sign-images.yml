name: Sign Docker Images

"on":
  workflow_run:
    workflows:
      - Build and Push Docker Images
    types:
      - completed

jobs:
  sign-images:
    name: Sign container images with Cosign
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign backend image
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/fastapi-backend:latest

      - name: Sign frontend image
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/fastapi-frontend:latest